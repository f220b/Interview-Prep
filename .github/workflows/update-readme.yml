name: Update README File List
on:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate File List
        run: |
          # Get list of directories (excluding .git and .github)
          file_list=$(ls -d */ | grep -vE '(.git|.github)/' | sed 's/\///g' | awk '{print "* " $0}')
          
          # Create temporary file
          echo "## Contents" > README_NEW.md
          echo "" >> README_NEW.md
          echo "$file_list" >> README_NEW.md
          echo "" >> README_NEW.md
          
          # Replace the block in the original README
          sed -n '1,//p' README.md > temp.md
          cat README_NEW.md >> temp.md
          sed -n '//,$p' README.md | tail -n +2 >> temp.md
          mv temp.md README.md

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: auto-update file list"
          git push
