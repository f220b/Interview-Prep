name: Update README File List
on:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate File List
        run: |
          file_list=$(ls -d */ | grep -vE '(.git|.github)/' | sed 's/\///g' | awk '{print "* " $0}')
          
          # Create the content block
          echo "" > content.md
          echo "$file_list" >> content.md
          echo "" >> content.md
          
          # Use perl to replace the block between markers
          perl -i -0777 -pe 's/.*/`cat content.md`/se' README.md

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update file list" && git push)
